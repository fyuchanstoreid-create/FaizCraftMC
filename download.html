<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at top,#0f172a,#020617);
  color:white;
}

/* card */
.box{
  text-align:center;
  padding:40px;
  width:320px;
  border-radius:20px;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 25px 80px rgba(0,0,0,0.7);
  animation:fade 0.8s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* loader */
.loader{
  width:50px;
  height:50px;
  border:4px solid rgba(255,255,255,0.1);
  border-top:4px solid #3b82f6;
  border-radius:50%;
  margin:auto;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

/* check */
.check{
  display:none;
  font-size:42px;
  animation:pop 0.4s ease;
}

@keyframes pop{
  from{transform:scale(0);}
  to{transform:scale(1);}
}

h2{
  margin-top:20px;
  font-size:20px;
}

p{
  font-size:14px;
  opacity:0.6;
  margin-top:5px;
}

/* button */
button{
  margin-top:20px;
  padding:10px 18px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="box">
  <div class="loader" id="loader"></div>
  <div class="check" id="check">✔</div>

  <h2 id="title">Menyiapkan download...</h2>
  <p id="status">File akan otomatis terunduh</p>

  <button onclick="manualDownload()">Download Manual</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const FILE_URL = params.get("file");

let started = false;

if(!FILE_URL){
  document.getElementById("title").innerText = "Link error";
  document.getElementById("status").innerText = "File tidak ditemukan";
  throw new Error("No file URL");
}

// 🔥 universal download (support semua file)
function triggerDownload(){
  window.location.href = FILE_URL;
}

window.onload = () => {
  setTimeout(startDownload, 1200);
};

function startDownload(){
  if(started) return;
  started = true;

  triggerDownload();

  setTimeout(() => {
    document.getElementById("loader").style.display = "none";
    document.getElementById("check").style.display = "block";

    document.getElementById("title").innerText = "Download dimulai";
    document.getElementById("status").innerText = "Cek notifikasi atau folder download";
  }, 1200);
}

function manualDownload(){
  triggerDownload();
}
</script>
</body>
</html>
