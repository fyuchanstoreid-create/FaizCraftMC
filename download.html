<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download - FaizCraftMC</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#ffffff;
  font-family:'Inter',sans-serif;
  overflow:hidden;
}

/* glow */
.bg-glow{
  position:absolute;
  width:500px;
  height:500px;
  background:#020617;
  filter:blur(140px);
  opacity:0.15;
  border-radius:50%;
  animation:move 10s infinite alternate ease-in-out;
}

@keyframes move{
  from{transform:translate(-100px,-100px);}
  to{transform:translate(120px,120px);}
}

/* brand */
.brand{
  position:absolute;
  top:30px;
  font-family:'Poppins',sans-serif;
  font-size:26px;
  font-weight:700;
  color:#020617;
}

/* card */
.box{
  width:360px;
  padding:45px;
  border-radius:28px;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(25px);
  box-shadow:0 30px 80px rgba(0,0,0,0.08);
  text-align:center;
}

/* loader */
.loader{
  width:60px;
  height:60px;
  border:5px solid rgba(0,0,0,0.1);
  border-top:5px solid #020617;
  border-radius:50%;
  margin:auto;
  animation:spin 1s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg);}}

/* success */
.check{
  display:none;
  font-size:52px;
  color:#020617;
}

/* text */
h2{
  margin-top:25px;
  font-size:22px;
  font-weight:600;
}

p{
  font-size:14px;
  color:#64748b;
  margin-top:8px;
}

/* filename */
.filename{
  margin-top:10px;
  font-size:13px;
  color:#020617;
  word-break:break-all;
}

/* progress */
.progress{
  margin-top:20px;
  width:100%;
  height:8px;
  background:#e2e8f0;
  border-radius:20px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:#020617;
  transition:0.3s;
}

/* button */
button{
  margin-top:25px;
  padding:12px 22px;
  border:none;
  border-radius:14px;
  background:#020617;
  color:white;
  cursor:pointer;
  transition:0.25s;
}

button:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(2,6,23,0.4);
}

button:active{
  transform:scale(0.95);
}
</style>
</head>

<body>

<div class="bg-glow"></div>
<div class="brand">FaizCraftMC</div>

<div class="box">
  <div class="loader" id="loader"></div>
  <div class="check" id="check">✔</div>

  <h2 id="title">Menyiapkan download...</h2>
  <p id="status">Menghubungkan ke server</p>

  <div class="filename" id="filename"></div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <button onclick="manualDownload()">Download Manual</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const file = params.get("file");

let progress = 0;
let interval;
let fileValid = false;

const bar = document.getElementById("bar");

if(file){
  document.getElementById("filename").innerText = file.split("/").pop();
}

// cek file
async function checkFile(url){
  try{
    const res = await fetch(url,{method:"HEAD"});
    return res.ok;
  }catch{
    return false;
  }
}

// progress sekali
function startProgress(callback){
  clearInterval(interval);
  progress = 0;
  bar.style.width = "0%";

  interval = setInterval(()=>{
    progress += Math.random()*7;
    if(progress >= 100){
      progress = 100;
      bar.style.width = "100%";
      clearInterval(interval);
      callback();
    } else {
      bar.style.width = progress + "%";
    }
  },200);
}

// auto start
window.onload = async () => {

  document.getElementById("status").innerText = "Memeriksa file...";
  fileValid = file ? await checkFile(file) : false;

  startProgress(()=>{
    document.getElementById("loader").style.display = "none";

    if(fileValid){
      document.getElementById("check").style.display = "block";
      document.getElementById("title").innerText = "Download dimulai";
      document.getElementById("status").innerText = "File sedang diunduh";
      triggerDownload();
    }else{
      document.getElementById("title").innerText = "File tidak ditemukan";
      document.getElementById("status").innerText = "Silakan coba manual";
    }
  });
};

// manual download (selalu ulang)
async function manualDownload(){
  document.getElementById("loader").style.display = "block";
  document.getElementById("check").style.display = "none";

  document.getElementById("title").innerText = "Mengulang...";
  document.getElementById("status").innerText = "Memeriksa file...";

  const valid = file ? await checkFile(file) : false;

  startProgress(()=>{
    document.getElementById("loader").style.display = "none";

    if(valid){
      document.getElementById("check").style.display = "block";
      document.getElementById("title").innerText = "Download dimulai ulang";
      document.getElementById("status").innerText = "File sedang diunduh";
      triggerDownload();
    }else{
      document.getElementById("title").innerText = "File tidak ditemukan";
      document.getElementById("status").innerText = "Masih belum tersedia";
    }
  });
}

// trigger download
function triggerDownload(){
  const a = document.createElement("a");
  a.href = file;
  a.download = file.split("/").pop();
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
</script>

</body>
</html>
